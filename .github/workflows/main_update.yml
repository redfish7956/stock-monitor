name: Auto Update Stock Data

on:
  schedule:
    - cron: '30 07 * * *'
    - cron: '00 10 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run ETL Collector
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python data_collector.py
      - name: Push file via API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 將 CSV 轉為 Base64
          CONTENT=$(base64 -w 0 final_database.csv)
          
          # 2. 獲取當前檔案的 SHA (GitHub API 更新檔案的必要條件)
          SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" \
            "https://api.github.com/repos/${{ github.repository }}/contents/final_database.csv" | jq -r .sha)
          
          # 3. 透過 API 強制覆寫檔案 (這不會觸發 Git 的衝突保護)
          curl -X PUT -H "Authorization: token $GITHUB_TOKEN" \
            -d "{\"message\":\"Auto-update stock data\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/final_database.csv"
