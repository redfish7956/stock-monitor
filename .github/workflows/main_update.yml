name: Auto Update Stock Data

on:
  schedule:
    - cron: '30 07 * * *'
    - cron: '00 10 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      # 1. 執行你的 ETL (完整保留你的時間戳與資料處理邏輯)
      - name: Run ETL Collector
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python data_collector.py
      
      # 2. 繞過 Git 的 API 強制覆蓋 (徹底解決 Rejected 衝突)
      - name: Upload file via API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 安裝 JSON 解析工具
          sudo apt-get install -y jq
          
          # 將檔案轉換為 Base64
          CONTENT=$(base64 -w 0 final_database.csv)
          
          # 取得檔案目前的 SHA (這是 API 覆寫檔案的必要條件)
          FILE_PATH="final_database.csv"
          URL="https://api.github.com/repos/${{ github.repository }}/contents/$FILE_PATH"
          
          # 獲取 SHA 值
          SHA=$(curl -s -H "Authorization: token $GITHUB_TOKEN" "$URL" | jq -r .sha)
          
          # 直接透過 API 寫入，這不會觸發 Git 的任何檢查
          curl -X PUT -H "Authorization: token $GITHUB_TOKEN" \
            -d "{\"message\":\"Auto-update: $(date +'%Y-%m-%d %H:%M:%S')\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}" \
            "$URL"
